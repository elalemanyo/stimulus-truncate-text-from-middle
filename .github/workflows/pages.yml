name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Prepare static site artifact
        run: mkdir -p _site && cp -R demo _site/demo && cp -R src _site/src && cp demo/index.html _site/index.html && python3 -c "from pathlib import Path; p = Path('_site/index.html'); p.write_text(p.read_text().replace('src=\"./application.js\"', 'src=\"./demo/application.js\"'))"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
