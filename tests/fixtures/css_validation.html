<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSS Validation Fixture</title>
    <script type="importmap">
      {
        "imports": {
          "@hotwired/stimulus": "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js",
          "@chenglou/pretext": "https://esm.sh/@chenglou/pretext@0.0.5"
        }
      }
    </script>
  </head>
  <body>
    <p id="bad" data-controller="truncate-text-middle" style="max-width: 220px; white-space: normal; overflow: visible;">
      Quarterly-Financial-Report-Final-Really-Final-v27.pdf
    </p>

    <script type="module">
      import { Application } from '@hotwired/stimulus'
      import TruncateTextMiddleController from '/src/truncate_text_middle_controller.js'

      Object.defineProperty(document, 'fonts', { value: undefined, configurable: true })

      window.__warnings = []
      const originalWarn = console.warn
      console.warn = (...args) => {
        window.__warnings.push(args.map(arg => String(arg)).join(' '))
        originalWarn(...args)
      }

      const application = Application.start()
      application.register('truncate-text-middle', TruncateTextMiddleController)
    </script>
  </body>
</html>
