<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resize Debounce Fixture</title>
    <script type="importmap">
      {
        "imports": {
          "@hotwired/stimulus": "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js",
          "@chenglou/pretext": "https://esm.sh/@chenglou/pretext@0.0.5"
        }
      }
    </script>
    <style>
      .sample { width: 220px; white-space: nowrap; overflow: hidden; }
    </style>
  </head>
  <body>
    <p id="debounced" class="sample" data-controller="truncate-text-middle">Quarterly-Financial-Report-Final-Really-Final-v27.pdf</p>

    <script type="module">
      import { Application } from '@hotwired/stimulus'
      import TruncateTextMiddleController from '/src/truncate_text_middle_controller.js'

      Object.defineProperty(document, 'fonts', { value: undefined, configurable: true })

      const originalRender = TruncateTextMiddleController.prototype.render
      TruncateTextMiddleController.prototype.render = function () {
        window.__renderCount = (window.__renderCount || 0) + 1
        return originalRender.call(this)
      }

      class MockResizeObserver {
        constructor (callback) {
          this.callback = callback
          window.__resizeObserver = this
        }

        observe () {}

        disconnect () {}

        trigger (times = 1) {
          for (let i = 0; i < times; i++) {
            this.callback([])
          }
        }
      }

      window.ResizeObserver = MockResizeObserver

      const application = Application.start()
      application.register('truncate-text-middle', TruncateTextMiddleController)
    </script>
  </body>
</html>
